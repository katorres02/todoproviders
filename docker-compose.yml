services:
  backend:
    build: ./backend
    environment:
      # Set DATABASE_URL in a root .env file or export it before running compose
      DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL to your PostgreSQL connection string}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      PORT: 4000
      CORS_ORIGIN: "http://localhost:8080"
      WEDDING_DATE: "${WEDDING_DATE:-2026-12-12}"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
